# Medicus Dictate configuration.
# Edit and restart the app (or use "Reload config" from the tray menu).

[hotkey]
# pynput format: <ctrl>, <alt>, <shift>, <cmd>, and letter/space keys.
combo = "<ctrl>+<alt>+<space>"

[audio]
sample_rate = 16000
channels = 1
# Input device index. Comment out to use the system default.
# Run `python -m sounddevice` to list devices.
# device = 0

[model]
# One of: tiny.en, base.en, small.en, medium.en, large-v3
name = "small.en"
# "cpu" or "cuda"
device = "cpu"
# "int8" (CPU), "float16" (CUDA), "int8_float16" (CUDA low-VRAM)
compute_type = "int8"
# Language hint. Leave empty to auto-detect. ".en" models ignore this.
language = "en"

[injection]
# "paste" (clipboard + Ctrl+V) or "type" (character-by-character)
mode = "paste"
# Small delay before injecting, so the user's focus has settled.
pre_delay_ms = 50

[commands]
# Voice phrases that insert punctuation / newlines / case changes instead of
# being typed literally. Built-in phrases include:
#   "new line", "new paragraph", "full stop", "period", "comma",
#   "question mark", "exclamation mark", "colon", "semicolon",
#   "open/close bracket", "open/close parenthesis", "open/close quote",
#   "hyphen", "cap <word>", "caps on ... caps off".
enabled = true

[smart]
# "off"    — no grammar/formatting tidy; raw Whisper output is injected.
# "rules"  — local regex tidy: sentence caps, "i" -> "I", punctuation spacing,
#            collapse whitespace, remove duplicate punctuation. ZERO deps.
# "ollama" — LOCAL Ollama LLM for grammar clean-up. Requires Ollama running
#            on this machine (or on a private-IP internal server). The app
#            REFUSES any endpoint that resolves to a public IP so patient
#            text can't leak by mis-configuration.
mode = "rules"
ollama_endpoint = "http://localhost:11434"
ollama_model = "llama3.2:3b"
ollama_timeout_s = 8.0
ollama_fallback_to_rules = true

[postprocess]
# Convert number words to digits: "twenty" -> "20", "two hundred" -> "200"
enable_number_words = true
# Abbreviate common units: "milligrams" -> "mg", "micrograms" -> "mcg"
enable_unit_abbrev = true
# BNF frequency shorthand: "twice daily" -> "BD", etc.
# Off by default because some clinicians prefer full text.
enable_bnf_frequencies = false

# Custom replacements, applied last. Case-insensitive whole-word match.
# Useful for colleague names and drug brands Whisper mangles.
[postprocess.custom]
# "doctor smith" = "Dr Smith"
# "amox" = "amoxicillin"
